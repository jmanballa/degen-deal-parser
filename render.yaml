services:
  - type: web
    name: degen-deal-parser
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: degen-eye-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://ops.degencollectibles.com
      - key: SESSION_COOKIE_NAME
        value: degen_session
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: SESSION_DOMAIN
        value: ops.degencollectibles.com
      - key: DISCORD_INGEST_ENABLED
        value: "false"
      - key: PARSER_WORKER_ENABLED
        value: "false"
      - key: AUTH_RESEED_PASSWORDS
        value: "false"
      - key: SESSION_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_DISPLAY_NAME
        value: Degen Admin
      - key: REVIEWER_USERNAME
        value: reviewer
      - key: REVIEWER_PASSWORD
        sync: false
      - key: REVIEWER_DISPLAY_NAME
        value: Degen Reviewer
      - key: DEGEN_EYE_V2_CAPTURE_ENABLED
        value: "true"
      - key: DEGEN_EYE_V2_CAPTURE_DIR
        value: /var/data/v2_training_scans
      - key: DEGEN_EYE_V2_INDEX_PATH
        value: /var/data/phash_index.sqlite
  - type: worker
    name: degen-deal-parser-worker
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker_service
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DISCORD_INGEST_ENABLED
        value: "true"
      - key: PARSER_WORKER_ENABLED
        value: "true"
      - key: STARTUP_BACKFILL_ENABLED
        value: "false"
      - key: AUTH_RESEED_PASSWORDS
        value: "false"
      - key: PARSER_POLL_SECONDS
        value: "2"
      - key: PARSER_BATCH_SIZE
        value: "10"
      - key: PARSER_MAX_ATTEMPTS
        value: "3"
      - key: RUNTIME_NAME
        value: local_ingest
      - key: RUNTIME_LABEL
        value: Ingest Worker
