name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SESSION_HTTPS_ONLY: "false"
      SESSION_DOMAIN: ""
      SESSION_SAME_SITE: "lax"
      SESSION_SECRET: "pytest-session-secret-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      ADMIN_PASSWORD: "pytest-admin-password-xxxxxxxxxxxxxxxxxxxxxxxx"
      EMPLOYEE_PII_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      EMPLOYEE_EMAIL_HASH_SALT: "pytest-email-salt"
      EMPLOYEE_TOKEN_HMAC_KEY: "pytest-token-hmac-key-xxxxxxxxxxxxxxxxxxxxxxxx"
      DATABASE_URL: "sqlite:////tmp/degen_ci_tests_${{ github.run_id }}.db"
      TIKTOK_APP_KEY: "pytest-tiktok-app-key"
      TIKTOK_APP_SECRET: "pytest-tiktok-app-secret"
      TIKTOK_REDIRECT_URI: "http://testserver/integrations/tiktok/callback"
      TIKTOK_SYNC_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium webkit

      - name: Run tests
        run: python -m unittest discover -s tests -v
