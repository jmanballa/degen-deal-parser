{% extends "team/_auth_shell.html" %}
{% block auth_sub %}
<p class="pt-auth-sub">Pick a new password. You'll be signed in right after.</p>
{% endblock %}
{% block content %}
<form method="post" action="/team/password/reset/{{ token }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="pt-field">
        <label class="pt-field-label" for="new_password">New password</label>
        <input class="pt-input" type="password" name="new_password" id="new_password" required autofocus autocomplete="new-password" placeholder="At least 12 characters">
        <div style="font-size:12px; color:var(--pt-muted); margin-top:6px;">Min 12 chars · 3 of: lowercase, UPPERCASE, number, symbol.</div>
    </div>
    <button class="pt-btn primary lg" type="submit" style="width:100%;">Set password</button>
</form>
{% endblock %}
