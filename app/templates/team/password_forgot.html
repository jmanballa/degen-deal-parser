{% extends "team/_auth_shell.html" %}
{% block content %}
<p style="font-size:13px;color:var(--lx-muted);margin-top:0">Enter your username or email. Your admin will share a reset link with you.</p>
<form method="post" action="/team/password/forgot">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="auth-field">
        <label for="identifier">Username or email</label>
        <input class="auth-input" type="text" name="identifier" id="identifier" required autofocus>
    </div>
    <button class="auth-btn" type="submit">Request reset</button>
</form>
<div class="auth-hint"><a href="/team/login">Back to sign in</a></div>
{% endblock %}
