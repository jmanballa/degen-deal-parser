{% extends "team/base.html" %}
{% block content %}
{% for p in policies %}
  <div class="tp-card">
    <h2>{{ p.title }} <span style="text-transform:none;font-size:11px;color:var(--lx-muted);">· {{ p.version }}</span></h2>
    <div style="font-size:13px; line-height:1.55;">{{ p.body_md }}</div>
    <div style="margin-top:14px; display:flex; align-items:center; gap:10px;">
      {% if p.id in acknowledged %}
        <span style="font-size:12px;color:#86efac;">Acknowledged</span>
      {% else %}
        <form method="post" action="/team/policies/acknowledge/{{ p.id }}" style="margin:0;">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button class="tp-btn primary" type="submit">I have read and agree</button>
        </form>
      {% endif %}
    </div>
  </div>
{% endfor %}
{% endblock %}
