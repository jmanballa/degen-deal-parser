{% extends "team/_auth_shell.html" %}
{% block auth_sub %}
<p class="pt-auth-sub">Welcome back. Sign in to your Degen portal.</p>
{% endblock %}
{% block content %}
<form method="post" action="/team/login" autocomplete="on">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
    <div class="pt-field">
        <label class="pt-field-label" for="username">Username</label>
        <input class="pt-input" type="text" name="username" id="username" required autofocus autocomplete="username" placeholder="jane.doe">
    </div>
    <div class="pt-field">
        <label class="pt-field-label" for="password">Password</label>
        <span class="pt-pw-wrap">
            <input class="pt-input" type="password" name="password" id="password" required autocomplete="current-password" placeholder="••••••••••••">
            <button type="button" class="pt-pw-toggle"
                    data-pw-target="password" aria-label="Show password" aria-pressed="false">Show</button>
        </span>
    </div>
    <button class="pt-btn primary lg" type="submit" style="width:100%; margin-top:6px;">Sign in</button>
</form>
<div class="pt-auth-hint"><a href="/team/password/forgot">Trouble signing in?</a></div>
<script>
(function(){
    document.querySelectorAll('[data-pw-target]').forEach(function(btn){
        btn.addEventListener('click', function(){
            var target = document.getElementById(btn.getAttribute('data-pw-target'));
            if (!target) return;
            var showing = target.type === 'text';
            target.type = showing ? 'password' : 'text';
            btn.textContent = showing ? 'Show' : 'Hide';
            btn.setAttribute('aria-pressed', showing ? 'false' : 'true');
            btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        });
    });
})();
</script>
{% endblock %}
