<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.webmanifest">
    <meta name="theme-color" content="#08090a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Degen">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>Scan Barcode — Inventory</title>
    <style>
        :root {
    --card: var(--lx-s1);
    --card-strong: var(--lx-s2);
    --line: var(--lx-br);
    --text: var(--lx-text);
    --muted: var(--lx-muted);
    --bg: var(--lx-bg);
    --bg-deep: var(--lx-bg);
    --shadow: 0 1px 3px rgba(0,0,0,.4);
    --accent: #ef4444;
    --accent-strong: #dc2626;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,.14);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,.14);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,.15);
    --blue: #60a5fa;
    --blue-bg: rgba(96,165,250,.14);
    --grey: #8b8f98;
    --grey-bg: rgba(139,143,152,.1);
}
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif; -webkit-font-smoothing:antialiased; color:var(--text); background:radial-gradient(circle at top left,rgba(240,196,107,.26),transparent 24%),radial-gradient(circle at 84% 10%,rgba(213,83,56,.10),transparent 18%),linear-gradient(180deg,#fcf7f0 0%,var(--bg) 46%,var(--bg-deep) 100%); }
        a { color:inherit; text-decoration:none; }
        .page { max-width:680px; margin:0 auto; padding:28px 28px 60px; }
        .card { padding:28px; margin-bottom:18px; background:linear-gradient(180deg,var(--card-strong),var(--card)); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow); text-align:center; }
        h1 { margin:16px 0 8px; font-size:clamp(28px,5vw,44px); line-height:1; letter-spacing:-.045em; color:#fff; font-weight:800; }
        p { color:#a7b0ba; margin:0 0 24px; font-size:15px; }
        .eyebrow { display:inline-flex; align-items:center; padding:5px 10px; border-radius:999px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; background:rgba(37,28,22,.06); color:#ebc67a; }
        .scan-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
        .scan-input { width:100%; max-width:380px; padding:16px 20px; border-radius:18px; border:2px solid var(--accent); background: var(--lx-s1); font:inherit; font-size:18px; font-weight:700; text-align:center; letter-spacing:.04em; outline:none; transition:box-shadow .2s; }
        .scan-input:focus { box-shadow:0 0 0 4px rgba(213,83,56,.2); }
        .scan-hint { font-size:13px; color:#a7b0ba; font-weight:500; }
        .status-msg { min-height:48px; font-size:15px; font-weight:700; padding:12px 18px; border-radius:14px; background:transparent; transition:all .2s; }
        .status-msg.searching { color:#8a580d; background:#fff5df; border:1px solid #f0cda0; }
        .status-msg.error { color:#9d2f2b; background:#fff0ef; border:1px solid #efb8b4; }
        .status-msg.found { color:#166647; background:#edf9f2; border:1px solid #a6e2bf; }
        .button { appearance:none; border:none; border-radius:14px; padding:11px 18px; font:inherit; font-weight:700; cursor:pointer; background: var(--lx-s1); color:var(--text); border:1px solid var(--line); margin-top:8px; }
        .back-link { color:#a7b0ba; font-size:13px; font-weight:600; margin-bottom:12px; display:inline-block; }
        .back-link:hover { color:var(--text); }
        .icon { font-size:48px; margin-bottom:8px; }
        @keyframes card-in { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
        .card { animation:card-in .45s cubic-bezier(.22,1,.36,1) both; }
    </style>
    <link rel="stylesheet" href="/static/linear.css?v=2026042012">
    <link rel="stylesheet" href="/static/safe-area.css?v=2026042020">
</head>
<body>
<div class="page">
    {% include "_linear_sidebar.html" %}
    <a href="/inventory" class="back-link">← Back to Inventory</a>

    <div class="card">
        <span class="eyebrow">Inventory</span>
        <div class="icon">&#9641;</div>
        <h1>Scan Mode</h1>
        <p>Focus the input below and scan a barcode with your USB scanner. The page will redirect automatically.</p>

        <div class="scan-wrap">
            <input id="scan-input" class="scan-input" type="text" placeholder="DGN-000001" autocomplete="off" autofocus>
            <div id="status" class="status-msg"></div>
            <a href="/inventory/new" class="button">+ Add New Item</a>
        </div>
    </div>
</div>

<script>
(function() {
    var input = document.getElementById('scan-input');
    var status = document.getElementById('status');
    var searching = false;

    function setStatus(msg, cls) {
        status.textContent = msg;
        status.className = 'status-msg ' + (cls || '');
    }

    input.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        var val = input.value.trim();
        if (!val || searching) return;

        searching = true;
        setStatus('Looking up ' + val + '…', 'searching');

        fetch('/inventory/api/lookup?barcode=' + encodeURIComponent(val))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                searching = false;
                if (data.found) {
                    setStatus('Found! Redirecting…', 'found');
                    setTimeout(function() { window.location.href = data.redirect; }, 300);
                } else {
                    setStatus('No item found for "' + val + '"', 'error');
                    input.value = '';
                    input.focus();
                }
            })
            .catch(function() {
                searching = false;
                setStatus('Lookup failed — check connection', 'error');
                input.value = '';
            });
    });

    // Always keep focus on input
    document.addEventListener('click', function() { input.focus(); });
    input.focus();
})();
</script>
    {% include '_mobile_bottom_nav.html' %}
</body>
</html>
