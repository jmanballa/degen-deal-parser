<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.webmanifest">
    <meta name="theme-color" content="#C8102E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Degen">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
    <link rel="stylesheet" href="/static/safe-area.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
    <title>{{ title }}</title>
    <style>
        :root { --bg:#f7f1e8; --card:#fffaf3; --line:#e4d5c3; --text:#241b15; --muted:#6b5b4f; --accent:#d55338; --shadow:0 18px 36px rgba(77,46,20,.12); }
        * { box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        body { margin:0; min-height:100vh; display:grid; place-items:center; padding:20px; font-family:"Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; color:var(--text); background:radial-gradient(circle at top left, rgba(240,196,107,.24), transparent 28%), linear-gradient(180deg,#fcf8f2 0%, var(--bg) 100%); }
        .card { width:min(460px,100%); background:var(--card); border:1px solid var(--line); border-radius:28px; box-shadow:var(--shadow); padding:28px; }
        .logo { display:block; width:min(220px,70%); margin:0 auto 14px; }
        .eyebrow { display:inline-flex; padding:6px 10px; border-radius:999px; background:rgba(37,28,22,.06); color:#ebc67a; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; }
        h1 { margin:12px 0 8px; font-size:36px; line-height:.95; letter-spacing:-.04em; color:#ffffff; font-weight:800; }
        p { margin:0 0 18px; color:#a7b0ba; line-height:1.5; }
        label { display:block; margin-bottom:12px; color:#a7b0ba; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; }
        input { width:100%; margin-top:6px; padding:12px 14px; border-radius:14px; border:1px solid var(--line); background:#fff; color:var(--text); font:inherit; }
        button { width:100%; appearance:none; border:none; border-radius:14px; padding:12px 14px; background:linear-gradient(135deg,var(--accent),#ef6e48); color:#fff; font:inherit; font-weight:800; cursor:pointer; box-shadow:0 10px 18px rgba(212,83,56,.22); }
        .error { margin-bottom:12px; padding:12px 14px; border-radius:14px; border:1px solid #efb8b4; background:#fff0ef; color:#9d2f2b; font-weight:700; }
        .helper { margin-top:14px; color:#a7b0ba; font-size:13px; line-height:1.5; }
        @keyframes card-in { from { opacity:0; transform:translateY(16px) scale(.985); } to { opacity:1; transform:none; } }
        .card { animation: card-in .5s cubic-bezier(.22,1,.36,1) both; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    </style>
    <link rel="stylesheet" href="/static/courtyard-theme.css?v=4">
</head>
<body>
    <form class="card" method="post" action="/login">
        <img class="logo" src="/static/degen-logo.png" alt="Degen Collectibles logo">
        <div class="eyebrow">Team Sign In</div>
        <h1>{{ title }}</h1>
        <p>Use your Degen internal account to review deals, browse reports, or manage the parser.</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>Username<input type="text" name="username" autocomplete="username" required></label>
        <label>Password<input type="password" name="password" autocomplete="current-password" required></label>
        <button type="submit">Sign In</button>
        <div class="helper">Admin and reviewer users are seeded from your local app settings, so you can start using roles without a big setup process.</div>
    </form>
</body>
</html>
