<!DOCTYPE html>
<html>
<head>
    {% include "_linear_base_head.html" %}
    <title>{{ title }}</title>
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 20% 10%, rgba(99,102,241,.12), transparent 40%),
                radial-gradient(circle at 80% 90%, rgba(168,85,247,.10), transparent 45%),
                #08090a !important;
        }
        .login-card {
            width: min(420px, 100%);
            background: var(--lx-s1);
            border: 1px solid var(--lx-br);
            border-radius: 14px;
            box-shadow: 0 30px 80px rgba(0,0,0,.55), 0 1px 2px rgba(0,0,0,.4);
            padding: 28px 26px;
            color: var(--lx-text);
        }
        .login-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }
        .login-brand img {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            border: 1px solid var(--lx-br);
            background: var(--lx-s2);
            object-fit: cover;
        }
        .login-brand-text { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
        .login-eyebrow {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--lx-muted);
            margin-bottom: 8px;
        }
        .login-card h1 {
            margin: 0 0 6px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--lx-text);
        }
        .login-card p { margin: 0 0 20px; color: var(--lx-muted); font-size: 13px; line-height: 1.5; }
        .login-card label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--lx-muted);
            margin-bottom: 12px;
        }
        .login-card input {
            width: 100%;
            margin-top: 6px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--lx-br2);
            background: var(--lx-bg);
            color: var(--lx-text);
            font: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 120ms, box-shadow 120ms;
        }
        .login-card input:focus {
            border-color: rgba(99,102,241,.55);
            box-shadow: 0 0 0 3px rgba(99,102,241,.2);
        }
        .login-card button {
            width: 100%;
            appearance: none;
            border: 1px solid rgba(99,102,241,.35);
            border-radius: 8px;
            padding: 10px 14px;
            background: linear-gradient(180deg, #5b60ea, #4b50d6);
            color: #fff;
            font: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: filter 120ms, transform 120ms;
        }
        .login-card button:hover { filter: brightness(1.08); }
        .login-card button:active { transform: translateY(1px); }
        .login-error {
            margin-bottom: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(239,68,68,.35);
            background: rgba(239,68,68,.1);
            color: #fca5a5;
            font-size: 12px;
            font-weight: 500;
        }
        .login-helper {
            margin-top: 14px;
            color: var(--lx-dim);
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <form class="login-card" method="post" action="/login">
        <div class="login-brand">
            <img src="/static/degen-logo.png" alt="">
            <span class="login-brand-text">Degen</span>
        </div>
        <div class="login-eyebrow">Team Sign In</div>
        <h1>{{ title }}</h1>
        <p>Use your Degen internal account to review deals, browse reports, or manage the parser.</p>
        {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>Username<input type="text" name="username" autocomplete="username" required></label>
        <label>Password<input type="password" name="password" autocomplete="current-password" required></label>
        <button type="submit">Sign In</button>
        <div class="login-helper">Admin and reviewer users are seeded from your local app settings.</div>
    </form>
</body>
</html>
