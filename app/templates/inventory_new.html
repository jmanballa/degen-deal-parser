<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.webmanifest">
    <meta name="theme-color" content="#08090a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Degen">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Add Inventory Item</title>
    <style>
        :root {
    --card: var(--lx-s1);
    --card-strong: var(--lx-s2);
    --line: var(--lx-br);
    --text: var(--lx-text);
    --muted: var(--lx-muted);
    --bg: var(--lx-bg);
    --bg-deep: var(--lx-bg);
    --shadow: 0 1px 3px rgba(0,0,0,.4);
    --accent: #ef4444;
    --accent-strong: #dc2626;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,.14);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,.14);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,.15);
    --blue: #60a5fa;
    --blue-bg: rgba(96,165,250,.14);
    --grey: #8b8f98;
    --grey-bg: rgba(139,143,152,.1);
}
        * { box-sizing:border-box; }
        body { margin:0; font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif; -webkit-font-smoothing:antialiased; color:var(--text); background: var(--lx-bg); }
        a { color:inherit; text-decoration:none; }
        .page { max-width:900px; margin:0 auto; padding:28px 28px 60px; }
        .card { padding:24px; margin-bottom:18px; background:linear-gradient(180deg,var(--card-strong),var(--card)); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow); }
        label { display:flex; flex-direction:column; gap:6px; color:#a7b0ba; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; margin-bottom:14px; }
        input, select, textarea { width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--line); background: var(--lx-s1); color:var(--text); font:inherit; }
        textarea { resize:vertical; min-height:80px; }
        .two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .button, button { appearance:none; border:none; border-radius:14px; padding:11px 18px; font:inherit; font-weight:700; cursor:pointer; transition:transform .15s; }
        .button:hover, button:hover { transform:translateY(-1px); }
        .primary-button { background: var(--lx-red); color:#fff; border:1px solid var(--lx-red); }
        .primary-button:hover { background:#dc2626; border-color:#dc2626; }
        .secondary-button { background: var(--lx-s1); color:var(--text); border:1px solid var(--line); }
        h1 { margin:0 0 6px; font-size:clamp(26px,4vw,38px); line-height:1; letter-spacing:-.04em; color:#fff; font-weight:800; }
        p { color:#a7b0ba; margin:0 0 16px; }
        .eyebrow { display:inline-flex; align-items:center; padding:5px 10px; border-radius:999px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; background:var(--lx-s2); color:var(--lx-muted); margin-bottom:10px; }
        .type-toggle { display:flex; gap:0; border:1px solid var(--line); border-radius:14px; overflow:hidden; width:fit-content; margin-bottom:20px; }
        .type-btn { padding:9px 22px; font:inherit; font-weight:700; font-size:13px; border:none; cursor:pointer; background: var(--lx-s1); color:#a7b0ba; transition:background .15s,color .15s; }
        .type-btn.active { background:var(--accent); color:#fff; }
        .slab-fields { display:none; }
        .slab-fields.visible { display:block; }
        .section-title { font-size:14px; font-weight:800; color:#a7b0ba; text-transform:uppercase; letter-spacing:.08em; margin:0 0 14px; padding-bottom:8px; border-bottom:1px solid var(--line); }
        .checkbox-row { display:flex; gap:10px; align-items:center; }
        .checkbox-row input[type=checkbox] { width:18px; height:18px; border-radius:5px; cursor:pointer; }
        .checkbox-label { font-size:13px; font-weight:600; color:var(--text); }
        .error-banner { padding:12px 16px; border-radius:14px; border:1px solid #efb8b4; background:#fff0ef; color:#9d2f2b; font-weight:700; margin-bottom:16px; }
        .back-link { color:#a7b0ba; font-size:13px; font-weight:600; margin-bottom:12px; display:inline-block; }
        .back-link:hover { color:var(--text); }
        @keyframes card-in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
        .card { animation:card-in .4s cubic-bezier(.22,1,.36,1) both; }
        @media(max-width:700px) { .two-col{grid-template-columns:1fr;} .page{padding:16px 14px 28px;} }
    </style>
    <link rel="stylesheet" href="/static/linear.css?v=2026042014">
    <link rel="stylesheet" href="/static/safe-area.css?v=2026042020">
</head>
<body>
<div class="page">
    {% include "_linear_sidebar.html" %}
    <a href="/inventory" class="back-link">← Back to Inventory</a>

    <div class="card">
        <span class="eyebrow">Inventory</span>
        <h1>Add Item</h1>
        <p>Add a single or graded slab. A unique barcode will be generated automatically.</p>

        {% if error %}<div class="error-banner">{{ error }}</div>{% endif %}

        <form method="post" action="/inventory/new" id="add-form">
            <!-- Type toggle -->
            <div class="section-title">Item Type</div>
            <div class="type-toggle">
                <button type="button" class="type-btn active" id="btn-single" onclick="setType('single')">Single</button>
                <button type="button" class="type-btn" id="btn-slab" onclick="setType('slab')">Slab</button>
            </div>
            <input type="hidden" name="item_type" id="item_type" value="single">

            <!-- Common fields -->
            <div class="section-title">Card Info</div>
            <div class="two-col">
                <div>
                    <label>Card Name *
                        <input type="text" name="card_name" required placeholder="e.g. Charizard" autofocus>
                    </label>
                    <label>Game *
                        <select name="game" required>
                            {% for g in games %}<option value="{{ g }}">{{ g }}</option>{% endfor %}
                        </select>
                    </label>
                    <label>Set Name
                        <input type="text" name="set_name" placeholder="e.g. Base Set">
                    </label>
                    <label>Set Code
                        <input type="text" name="set_code" placeholder="e.g. base1 (for API lookup)">
                    </label>
                    <label>Card Number
                        <input type="text" name="card_number" placeholder="e.g. 4/102">
                    </label>
                    <label>Language
                        <input type="text" name="language" value="English">
                    </label>
                </div>
                <div>
                    <!-- Single-specific -->
                    <div id="single-fields">
                        <label>Condition
                            <select name="condition">
                                <option value="">— Select —</option>
                                {% for c in conditions %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
                            </select>
                        </label>
                    </div>

                    <!-- Slab-specific -->
                    <div class="slab-fields" id="slab-fields">
                        <label>Grading Company *
                            <select name="grading_company" id="grading_company">
                                <option value="">— Select —</option>
                                {% for gc in grading_companies %}<option value="{{ gc }}">{{ gc }}</option>{% endfor %}
                            </select>
                        </label>
                        <label>Grade *
                            <input type="text" name="grade" id="grade" placeholder="e.g. 10, 9.5, 9">
                        </label>
                        <label>Cert Number
                            <input type="text" name="cert_number" placeholder="PSA/BGS/CGC cert number">
                        </label>
                    </div>

                    <label>Quantity
                        <input type="number" name="quantity" value="1" min="1">
                    </label>
                    <label>Cost Basis ($)
                        <input type="text" name="cost_basis" placeholder="0.00">
                    </label>
                    <label>List Price ($)
                        <input type="text" name="list_price" placeholder="Leave blank to use auto price">
                    </label>
                    <label>Notes
                        <textarea name="notes" placeholder="Optional notes…"></textarea>
                    </label>
                </div>
            </div>

            <!-- Options -->
            <div class="section-title" style="margin-top:8px;">Options</div>
            <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px;">
                <label class="checkbox-row">
                    <input type="checkbox" name="auto_price_on_save" value="on" checked>
                    <span class="checkbox-label">Auto-price on save</span>
                </label>
                <label class="checkbox-row">
                    <input type="checkbox" name="push_shopify_on_save" value="on">
                    <span class="checkbox-label">Push to Shopify on save</span>
                </label>
            </div>

            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button type="submit" class="primary-button">Add Item</button>
                <a href="/inventory" class="button secondary-button">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
function setType(type) {
    document.getElementById('item_type').value = type;
    document.getElementById('btn-single').className = 'type-btn' + (type === 'single' ? ' active' : '');
    document.getElementById('btn-slab').className = 'type-btn' + (type === 'slab' ? ' active' : '');
    document.getElementById('slab-fields').className = 'slab-fields' + (type === 'slab' ? ' visible' : '');
    document.getElementById('single-fields').style.display = type === 'single' ? '' : 'none';
}
</script>
    {% include '_mobile_bottom_nav.html' %}
</body>
</html>
