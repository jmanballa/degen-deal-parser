    function executeSearch() {
        var query = (document.getElementById('search-query').value || '').trim();
        if (!query) return;

        var results = document.getElementById('search-results');
        results.innerHTML = '<div class="search-spinner">Searching...</div>';
        _searchCandidates = [];
        _searchSelectedIdx = -1;

        fetch('/inventory/scan/pokemon/text-search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query, category_id: selectedCategoryId })
        })
        .then(function(r) {
            if (!r.ok) return r.text().then(function(t) { throw new Error('Server error ' + r.status + ': ' + t.slice(0, 200)); });
            return r.json();
        })
        .then(function(data) {
            _searchCandidates = data.candidates || [];
            _searchGame = data.game || null;
            if (!_searchCandidates.length) {
                results.innerHTML = '<div class="search-empty">No cards found for &ldquo;' + escHtml(query) + '&rdquo;</div>';
                return;
            }
            var html = '<div class="candidates-grid">';
            for (var i = 0; i < _searchCandidates.length; i++) {
                var c = _searchCandidates[i];
                var ci = c.image_url_small || c.image_url || '';
                html += '<div class="candidate-card" data-sidx="' + i + '" onclick="PKScanner.selectSearchCandidate(' + i + ')">';
                if (ci) html += '<img src="' + escHtml(ci) + '" alt="" onerror="this.style.display=\'none\'">';
                else html += '<div class="candidate-placeholder">&#127183;</div>';
                html += '<div class="c-name">' + escHtml(c.name) + '</div>';
                html += '<div class="c-set">' + escHtml(c.set_name) + '</div>';
                html += '<div class="c-set">#' + escHtml(c.number) + '</div>';
                if (c.market_price) html += '<div class="c-price">$' + Number(c.market_price).toFixed(2) + '</div>';
                else html += '<div class="c-price c-price-none">No price</div>';
                html += '</div>';
            }
            html += '</div>';
            html += '<div id="search-detail"></div>';
            results.innerHTML = html;

            if (data.best_match) {
                for (var bi = 0; bi < _searchCandidates.length; bi++) {
                    if (_searchCandidates[bi].name === data.best_match.name && _searchCandidates[bi].number === data.best_match.number) {
                        selectSearchCandidate(bi);
                        break;
                    }
                }
            }
        })
        .catch(function(err) {
            results.innerHTML = '<div class="search-empty">Search failed: ' + escHtml(err.message) + '</div>';
        });
    }

    function selectSearchCandidate(idx) {
        _searchSelectedIdx = idx;
        var cards = document.querySelectorAll('#search-results .candidate-card');
        for (var i = 0; i < cards.length; i++) {
            cards[i].classList.toggle('selected', parseInt(cards[i].getAttribute('data-sidx')) === idx);
        }

        var c = _searchCandidates[idx];
        if (!c) return;

        var variants = c.available_variants || [];
        var dp = _pickDisplayPrice(c, variants, null);
        var priceHtml = dp.value ? '$' + dp.value.toFixed(2) + (dp.isTcgLow ? ' (TCG Low)' : '') : 'No price';

        var variantHtml = '';
        if (variants.length) {
            variantHtml = '<div style="margin-top:8px;"><label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Variant:</label>';
            variantHtml += '<select id="search-variant" onchange="PKScanner._updateSearchPrice()" style="width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;">';
            for (var vi = 0; vi < variants.length; vi++) {
                var v = variants[vi];
                var condsAttr = v.conditions ? ' data-conditions="' + escHtml(JSON.stringify(v.conditions)) + '"' : '';
                var vl = v.price != null ? ' \u2014 $' + Number(v.price).toFixed(2) : (v.low_price != null ? ' \u2014 $' + Number(v.low_price).toFixed(2) + ' (TCG Low)' : '');
                variantHtml += '<option value="' + escHtml(v.name) + '" data-price="' + (v.price != null ? v.price : '') + '" data-low="' + (v.low_price != null ? v.low_price : '') + '"' + condsAttr + '>' + escHtml(v.name) + vl + '</option>';
            }
            variantHtml += '</select></div>';
        }

        var condHtml = '<div style="margin-top:8px;"><label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Condition:</label>';
        condHtml += '<select id="search-condition" onchange="PKScanner._updateSearchPrice()" style="width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;">';
        for (var ci = 0; ci < CONDITIONS.length; ci++) {
            condHtml += '<option value="' + CONDITIONS[ci] + '"' + (CONDITIONS[ci] === 'NM' ? ' selected' : '') + '>' + CONDITIONS[ci] + '</option>';
        }
        condHtml += '</select></div>';

        var btnLabel = _searchMode === 'replace' ? 'Replace Card' : 'Add to Batch';

        var detail = document.getElementById('search-detail');
        if (detail) {
            detail.innerHTML =
                '<div class="search-candidate-detail">' +
                    '<div class="detail-name">' + escHtml(c.name) + '</div>' +
                    '<div class="detail-meta">' + escHtml(c.set_name) + ' #' + escHtml(c.number) + (c.rarity ? ' \u00b7 ' + escHtml(c.rarity) : '') + '</div>' +
                    '<div class="detail-price">' + priceHtml + '</div>' +
                    variantHtml +
                    condHtml +
                    '<div class="overlay-actions" style="margin-top:12px;">' +
                        '<button class="btn-primary" onclick="PKScanner.confirmSearchSelection()">' + btnLabel + '</button>' +
                    '</div>' +
                '</div>';
        }
    }

    function _updateSearchPrice() {
        if (_searchSelectedIdx < 0 || !_searchCandidates[_searchSelectedIdx]) return;
        var c = _searchCandidates[_searchSelectedIdx];
        var variants = c.available_variants || [];
        var varSel = document.getElementById('search-variant');
        var condSel = document.getElementById('search-condition');
        var condition = condSel ? condSel.value : 'NM';

        var resolved = { value: null, isTcgLow: false };
        if (varSel) {
            var opt = varSel.options[varSel.selectedIndex];
            var condsRaw = opt ? opt.getAttribute('data-conditions') : null;
            var varObj = { price: parseFloat(opt.getAttribute('data-price')) || null, low_price: parseFloat(opt.getAttribute('data-low')) || null };
            if (condsRaw) {
                try { varObj.conditions = JSON.parse(condsRaw); } catch(e) {}
            }
            resolved = _resolveConditionPrice(varObj, condition);
        }
        if (!resolved.value) resolved = _pickDisplayPrice(c, variants, null);

        var priceEl = document.querySelector('#search-detail .detail-price');
        if (priceEl) {
            priceEl.textContent = resolved.value ? '$' + resolved.value.toFixed(2) + (resolved.isTcgLow ? ' (TCG Low)' : '') : 'No price';
        }
    }

    function confirmSearchSelection() {
        if (_searchSelectedIdx < 0 || !_searchCandidates[_searchSelectedIdx]) return;
        var c = _searchCandidates[_searchSelectedIdx];
        var variants = c.available_variants || [];

        var varSel = document.getElementById('search-variant');
        var condSel = document.getElementById('search-condition');
        var variant = varSel ? varSel.value : (variants.length ? variants[0].name : '');
        var condition = condSel ? condSel.value : 'NM';

        var varObj = null;
        for (var vi = 0; vi < variants.length; vi++) {
            if (variants[vi].name === variant) { varObj = variants[vi]; break; }
        }
        var resolved = varObj ? _resolveConditionPrice(varObj, condition) : _pickDisplayPrice(c, variants, null);
        var isFoil = variant && variant.toLowerCase().indexOf('holo') >= 0;

        var notes = c.rarity ? ('Rarity: ' + c.rarity) : '';
        if (variant) notes = (notes ? notes + ' | ' : '') + 'Variant: ' + variant;
        if (resolved.isTcgLow) notes = (notes ? notes + ' | ' : '') + 'Price: TCG Low';

        var item = {
            card_name: c.name || '',
            game: _searchGame || categoryIdToGame(selectedCategoryId),
            condition: condition,
            set_name: c.set_name || '',
            card_number: c.number || '',
            image_url: c.image_url || '',
            auto_price: resolved.value,
            is_foil: isFoil,
            variant: variant,
            notes: notes,
            _available_variants: variants,
        };

        if (_searchMode === 'replace' && _searchReplaceIdx >= 0 && batch[_searchReplaceIdx]) {
            batch[_searchReplaceIdx] = item;
        } else {
            batch.push(item);
        }
        saveBatch();
        closeSearchSheet();
        renderBatch();
        showToast(_searchMode === 'replace' ? 'Card replaced' : 'Card added: ' + c.name, 2000);
    }

    function closeSearchSheet() {
        _searchMode = 'add';
        _searchReplaceIdx = -1;
        _searchCandidates = [];
        _searchGame = null;
        _searchSelectedIdx = -1;
        document.getElementById('search-overlay').classList.remove('open');
    }

    // ------------------------------------------------------------------
    // Init
    // ------------------------------------------------------------------
    renderBatch();

    document.getElementById('flip-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'none';

    Drawer.init();
    loadCategories();

    if (isMobile()) {
        document.getElementById('rapid-fire').checked = true;
        startCamera();
    }

    return {
        startCamera: startCamera,
        stopCamera: stopCamera,
        flipCamera: flipCamera,
        addBestMatch: addBestMatch,
        pickCandidate: pickCandidate,
        onVariantChange: onVariantChange,
        onResultConditionChange: onResultConditionChange,
        retake: retake,
        clearBatch: clearBatch,
        goReview: goReview,
        toggleDebug: toggleDebug,
        reviewQueueItem: reviewQueueItem,
        removeQueueItem: removeQueueItem,
        openEditSheet: openEditSheet,
        saveEditSheet: saveEditSheet,
        closeEditSheet: closeEditSheet,
        openSearchSheet: openSearchSheet,
        executeSearch: executeSearch,
        selectSearchCandidate: selectSearchCandidate,
        confirmSearchSelection: confirmSearchSelection,
        closeSearchSheet: closeSearchSheet,
        _updateSearchPrice: _updateSearchPrice,
    };
})();
</script>
</body>
</html>
