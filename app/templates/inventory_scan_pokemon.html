<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>Pokémon Card Scanner — Inventory</title>
    <style>
        :root {
            --bg:#f4ebdf; --bg-deep:#ead8c0; --card:#fff9f2; --card-strong:#fffdf8;
            --line:#deccb6; --text:#24170f; --muted:#6b5849; --accent:#d55338;
            --accent-strong:#9f311d; --green:#166647; --green-bg:#edf9f2;
            --yellow-bg:#fff5df; --red-bg:#fff0ef; --blue:#1a6fb5; --blue-bg:#e8f4fd;
            --shadow:0 20px 44px rgba(77,46,20,.13);
        }
        * { box-sizing:border-box; }
        body {
            margin:0; font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
            -webkit-font-smoothing:antialiased; color:var(--text);
            background:radial-gradient(circle at top left,rgba(240,196,107,.26),transparent 24%),
                radial-gradient(circle at 84% 10%,rgba(213,83,56,.10),transparent 18%),
                linear-gradient(180deg,#fcf7f0 0%,var(--bg) 46%,var(--bg-deep) 100%);
            min-height:100vh;
        }
        a { color:inherit; text-decoration:none; }
        .page { max-width:1100px; margin:0 auto; padding:28px 20px 80px; }
        .back-link { color:var(--muted); font-size:13px; font-weight:600; margin-bottom:12px; display:inline-block; }
        .back-link:hover { color:var(--text); }

        .scan-layout { display:grid; grid-template-columns:1fr 340px; gap:20px; align-items:start; }
        @media(max-width:780px) { .scan-layout { grid-template-columns:1fr; } }

        .card {
            background:linear-gradient(180deg,var(--card-strong),var(--card));
            border:1px solid var(--line); border-radius:24px;
            box-shadow:var(--shadow); overflow:hidden;
        }
        .card-header { padding:20px 22px 0; }
        .card-title { font-size:17px; font-weight:800; margin:0 0 4px; letter-spacing:-.02em; }
        .card-sub { font-size:12px; color:var(--muted); font-weight:500; margin:0 0 14px; }

        /* Camera — portrait orientation for vertical card scanning */
        .camera-wrap {
            position:relative; width:100%; aspect-ratio:3/4;
            background:#1a1208; overflow:hidden;
        }
        video { width:100%; height:100%; object-fit:cover; display:block; }
        canvas { display:none; }

        .guide-overlay {
            position:absolute; inset:0; pointer-events:none; display:flex;
            align-items:center; justify-content:center;
        }
        .guide-rect {
            width:68%; aspect-ratio:5/7; border:2px dashed rgba(255,255,255,.55);
            border-radius:12px; position:relative;
        }
        .guide-label {
            position:absolute; bottom:-24px; left:50%; transform:translateX(-50%);
            font-size:11px; color:rgba(255,255,255,.6); font-weight:600; white-space:nowrap;
        }

        .camera-overlay {
            position:absolute; inset:0; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:10px;
        }
        .camera-placeholder {
            color:rgba(255,255,255,.4); text-align:center; font-size:13px; font-weight:600;
        }
        .capture-btn {
            position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
            width:72px; height:72px; border-radius:50%;
            border:4px solid #fff; background:rgba(255,255,255,.15);
            cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center;
            z-index:5;
        }
        .capture-btn:hover { background:rgba(255,255,255,.28); }
        .capture-btn:active { transform:translateX(-50%) scale(.92); }
        .capture-btn-inner {
            width:52px; height:52px; border-radius:50%;
            background:var(--accent); transition:background .15s;
        }
        .capture-btn:disabled .capture-btn-inner { background:rgba(255,255,255,.3); }
        .capture-btn:disabled { cursor:not-allowed; }

        .flash-overlay {
            position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none;
            transition:opacity .05s;
        }
        .flash-overlay.active { opacity:.7; }

        /* Camera controls */
        .camera-controls { padding:14px 22px 20px; display:flex; gap:10px; flex-wrap:wrap; }
        .btn-outline {
            appearance:none; border:1px solid var(--line); border-radius:12px;
            padding:9px 14px; font:inherit; font-size:13px; font-weight:700;
            background:linear-gradient(180deg,#fffdfa,#fff4e8);
            color:var(--text); cursor:pointer; transition:all .15s;
        }
        .btn-outline:hover { background:#fff7ee; border-color:#c9b8a0; }
        .btn-primary {
            appearance:none; border:none; border-radius:12px;
            padding:9px 16px; font:inherit; font-size:13px; font-weight:700;
            background:linear-gradient(180deg,var(--accent),var(--accent-strong));
            color:#fff; cursor:pointer; transition:all .15s;
        }
        .btn-primary:hover { opacity:.9; }

        /* Status bar */
        .status-bar {
            padding:10px 14px; font-size:13px; font-weight:700; display:none;
            border-top:1px solid var(--line);
        }
        .status-bar.ok { background:var(--green-bg); color:var(--green); display:block; }
        .status-bar.warn { background:var(--yellow-bg); color:#7a5200; display:block; }
        .status-bar.err { background:var(--red-bg); color:#9d2f2b; display:block; }
        .status-bar.info { background:var(--blue-bg); color:var(--blue); display:block; }

        /* Result panel */
        .result-panel { padding:16px 22px 22px; display:none; }
        .result-panel.visible { display:block; }

        .result-match {
            display:flex; gap:14px; padding:14px; border-radius:16px;
            background:#fff; border:1px solid var(--line); margin-bottom:12px;
        }
        .result-img {
            width:80px; height:112px; border-radius:8px; object-fit:cover;
            background:#f0e8dc; border:1px solid var(--line); flex-shrink:0;
        }
        .result-details { flex:1; min-width:0; }
        .result-name { font-size:16px; font-weight:800; margin-bottom:2px; }
        .result-set { font-size:12px; color:var(--muted); font-weight:500; }
        .result-number { font-size:12px; color:var(--muted); font-weight:500; margin-top:2px; }
        .result-price {
            font-size:18px; font-weight:900; color:var(--green); margin-top:6px;
        }
        .result-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }

        /* Confidence badge */
        .badge {
            display:inline-block; padding:3px 10px; border-radius:999px;
            font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em;
        }
        .badge-high { background:var(--green-bg); color:var(--green); border:1px solid #a6e2bf; }
        .badge-medium { background:var(--yellow-bg); color:#7a5200; border:1px solid #f0cda0; }
        .badge-low { background:var(--red-bg); color:#9d2f2b; border:1px solid #efb8b4; }

        /* Candidate grid */
        .candidates-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
            gap:10px; margin-top:12px;
        }
        .candidate-card {
            cursor:pointer; padding:10px; border-radius:14px; text-align:center;
            background:#fff; border:2px solid var(--line); transition:all .15s;
        }
        .candidate-card:hover { border-color:var(--accent); transform:translateY(-2px); }
        .candidate-card.selected { border-color:var(--accent); background:var(--red-bg); }
        .candidate-card img {
            width:100%; aspect-ratio:5/7; object-fit:cover; border-radius:8px;
            background:#f0e8dc; margin-bottom:6px;
        }
        .candidate-card .c-name { font-size:11px; font-weight:700; line-height:1.3; }
        .candidate-card .c-set { font-size:10px; color:var(--muted); }
        .candidate-card .c-score {
            font-size:10px; font-weight:700; color:var(--accent); margin-top:3px;
        }

        /* Debug panel */
        .debug-toggle {
            font-size:12px; color:var(--muted); font-weight:600; cursor:pointer;
            padding:8px 0; border:none; background:none; display:flex; align-items:center; gap:4px;
        }
        .debug-toggle:hover { color:var(--text); }
        .debug-content {
            display:none; padding:10px; background:rgba(0,0,0,.03); border-radius:10px;
            font-size:11px; line-height:1.6; font-family:monospace; color:var(--muted);
            max-height:240px; overflow-y:auto; margin-top:6px; word-break:break-all;
        }
        .debug-content.open { display:block; }

        /* Batch sidebar */
        .batch-header { padding:20px 22px 0; display:flex; align-items:center; justify-content:space-between; }
        .batch-count {
            display:inline-flex; align-items:center; padding:4px 10px;
            border-radius:999px; font-size:12px; font-weight:800;
            background:rgba(213,83,56,.1); color:var(--accent);
        }
        .batch-total {
            font-size:14px; font-weight:800; color:var(--green); padding:4px 22px;
        }
        .batch-list { padding:12px 14px; max-height:480px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
        .batch-list:empty::after {
            content:"No cards scanned yet."; display:block; color:var(--muted);
            font-size:13px; font-weight:500; text-align:center; padding:20px 0;
        }
        .batch-item {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; border-radius:14px;
            background:var(--card-strong); border:1px solid var(--line);
            animation:item-in .25s ease both;
        }
        .batch-thumb {
            width:40px; height:56px; border-radius:6px; object-fit:cover;
            background:#f0e8dc; flex-shrink:0; border:1px solid var(--line);
        }
        .batch-thumb-placeholder {
            width:40px; height:56px; border-radius:6px; background:#f0e8dc;
            border:1px solid var(--line); flex-shrink:0; display:flex;
            align-items:center; justify-content:center; font-size:18px; color:var(--muted);
        }
        .batch-info { flex:1; min-width:0; }
        .batch-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .batch-meta { font-size:11px; color:var(--muted); font-weight:500; margin-top:2px; }
        .batch-cond {
            font-size:12px; font-weight:700; padding:3px 8px; border-radius:8px;
            border:1px solid var(--line); background:#fff; cursor:pointer;
            font-family:inherit; color:var(--text); flex-shrink:0;
        }
        .batch-del {
            appearance:none; border:none; background:none; cursor:pointer;
            font-size:16px; color:var(--muted); padding:4px; flex-shrink:0;
            border-radius:6px; line-height:1;
        }
        .batch-del:hover { color:var(--accent); background:var(--red-bg); }
        .batch-footer { padding:14px 22px 22px; border-top:1px solid var(--line); display:flex; gap:10px; flex-wrap:wrap; }
        .btn-done {
            flex:1; appearance:none; border:none; border-radius:14px;
            padding:14px; font:inherit; font-size:15px; font-weight:800;
            background:linear-gradient(180deg,var(--accent),var(--accent-strong));
            color:#fff; cursor:pointer; transition:all .15s;
        }
        .btn-done:hover { opacity:.9; }
        .btn-done:disabled { opacity:.4; cursor:not-allowed; }

        .spinner { display:inline-block; width:18px; height:18px; border:2.5px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes item-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

        .cond-NM { background:#edf9f2; border-color:#a6e2bf; color:var(--green); }
        .cond-LP { background:#f0f9ff; border-color:#93d5f5; color:#1d5c8a; }
        .cond-MP { background:#fff5df; border-color:#f0cda0; color:#7a5200; }
        .cond-HP { background:#fff0ef; border-color:#efb8b4; color:#9d2f2b; }
        .cond-DMG { background:#f8f0f8; border-color:#d8b0d8; color:#6a286a; }

        .hidden { display:none !important; }
    </style>
    <link rel="stylesheet" href="/static/courtyard-theme.css?v=4">
</head>
<body>
<div class="page">
    {% include "_workspace_nav.html" %}
    <a href="/inventory" class="back-link">&larr; Back to Inventory</a>

    <div class="scan-layout">
        <!-- Left: Camera + Result -->
        <div>
            <div class="card" style="margin-bottom:20px;">
                <div class="card-header">
                    <div class="card-title">Pok&eacute;mon Card Scanner</div>
                    <div class="card-sub">Align card within the guide, then capture. OCR + database lookup identifies the card.</div>
                </div>

                <div class="camera-wrap" id="camera-wrap">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="canvas"></canvas>
                    <div class="guide-overlay" id="guide-overlay">
                        <div class="guide-rect">
                            <span class="guide-label">Align card here</span>
                        </div>
                    </div>
                    <div id="camera-placeholder" class="camera-overlay">
                        <div class="camera-placeholder">
                            <div style="font-size:36px;margin-bottom:8px;">&#128247;</div>
                            Tap &ldquo;Start Camera&rdquo; to begin
                        </div>
                    </div>
                    <div class="flash-overlay" id="flash-overlay"></div>
                    <button class="capture-btn" id="capture-btn" disabled title="Capture card">
                        <div class="capture-btn-inner"></div>
                    </button>
                </div>

                <div id="status-bar" class="status-bar"></div>

                <div class="camera-controls">
                    <button class="btn-outline" id="start-btn" onclick="PKScanner.startCamera()">Start Camera</button>
                    <button class="btn-outline" id="flip-btn" class="hidden" onclick="PKScanner.flipCamera()">Flip &#8635;</button>
                    <button class="btn-outline" id="stop-btn" class="hidden" onclick="PKScanner.stopCamera()">Stop</button>
                    <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted);margin-left:auto;">
                        <input type="checkbox" id="auto-capture" style="accent-color:var(--accent);">
                        Auto next
                    </label>
                </div>
            </div>

            <!-- Result panel (shown after scan) -->
            <div class="card" id="result-panel-card">
                <div class="result-panel" id="result-panel">
                    <div id="result-content"></div>

                    <button class="debug-toggle" id="debug-toggle" onclick="PKScanner.toggleDebug()">
                        <span id="debug-arrow">&#9654;</span> Debug Info
                    </button>
                    <div class="debug-content" id="debug-content"></div>
                </div>
            </div>
        </div>

        <!-- Right: Batch sidebar -->
        <div class="card">
            <div class="batch-header">
                <div>
                    <div class="card-title">Scanned Batch</div>
                    <div class="card-sub">Cards identified and queued for inventory.</div>
                </div>
                <span class="batch-count" id="batch-count">0 cards</span>
            </div>
            <div class="batch-total" id="batch-total"></div>
            <div id="batch-list" class="batch-list"></div>
            <div class="batch-footer">
                <button class="btn-outline" onclick="PKScanner.clearBatch()" id="clear-btn" disabled>Clear</button>
                <button class="btn-done" id="done-btn" onclick="PKScanner.goReview()" disabled>Review Batch &rarr;</button>
            </div>
        </div>
    </div>
</div>

<script>
var PKScanner = (function() {
    var CONDITIONS = {{ conditions | tojson }};
    var batch = JSON.parse(localStorage.getItem('scan_batch') || '[]');
    var stream = null;
    var facingMode = 'environment';
    var capturing = false;
    var lastResult = null;

    function escHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ------------------------------------------------------------------
    // Camera
    // ------------------------------------------------------------------
    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: facingMode,
                    width: { ideal: 1080, min: 720 },
                    height: { ideal: 1920, min: 1280 },
                    focusMode: { ideal: 'continuous' },
                }
            });
            var video = document.getElementById('video');
            video.srcObject = stream;
            document.getElementById('camera-placeholder').style.display = 'none';
            document.getElementById('capture-btn').disabled = false;
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('flip-btn').style.display = '';
            document.getElementById('stop-btn').style.display = '';
        } catch(e) {
            showStatus('Camera access denied: ' + e.message, 'err');
        }
    }

    function stopCamera() {
        if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
        document.getElementById('video').srcObject = null;
        document.getElementById('camera-placeholder').style.display = '';
        document.getElementById('capture-btn').disabled = true;
        document.getElementById('start-btn').style.display = '';
        document.getElementById('flip-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'none';
    }

    async function flipCamera() {
        facingMode = facingMode === 'environment' ? 'user' : 'environment';
        stopCamera();
        await startCamera();
    }

    // ------------------------------------------------------------------
    // Capture & Pipeline
    // ------------------------------------------------------------------
    document.getElementById('capture-btn').addEventListener('click', captureFrame);

    async function captureFrame() {
        if (capturing) return;
        capturing = true;
        var btn = document.getElementById('capture-btn');
        btn.disabled = true;

        // Flash effect
        var flash = document.getElementById('flash-overlay');
        flash.classList.add('active');
        setTimeout(function() { flash.classList.remove('active'); }, 150);

        showStatus('<span class="spinner"></span> Scanning card...', 'info');

        try {
            var video = document.getElementById('video');
            var canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            canvas.getContext('2d').drawImage(video, 0, 0);
            var b64 = canvas.toDataURL('image/jpeg', 0.92).split(',')[1];

            var resp = await fetch('/inventory/scan/pokemon/identify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: b64 })
            });
            var data = await resp.json();
            lastResult = data;

            if (data.status === 'ERROR') {
                showStatus(data.error || 'Pipeline error', 'err');
                showResult(data);
            } else if (data.status === 'NO_MATCH') {
                showStatus('No matching card found. Try again or adjust angle.', 'warn');
                showResult(data);
            } else if (data.status === 'AMBIGUOUS') {
                showStatus('Multiple matches found — pick the correct card below.', 'warn');
                showResult(data);
            } else {
                // MATCHED
                var best = data.best_match;
                var price = best.market_price ? ('$' + Number(best.market_price).toFixed(2)) : '';
                showStatus('Matched: ' + best.name + (price ? ' — ' + price : ''), 'ok');
                showResult(data);

                if (best.confidence === 'HIGH' && document.getElementById('auto-capture').checked) {
                    addToBatch(best);
                    setTimeout(function() {
                        capturing = false;
                        btn.disabled = false;
                        captureFrame();
                    }, 1500);
                    return;
                }
            }
        } catch(e) {
            showStatus('Error: ' + e.message, 'err');
        }

        capturing = false;
        btn.disabled = !stream;
    }

    // ------------------------------------------------------------------
    // Result display
    // ------------------------------------------------------------------
    function showResult(data) {
        var panel = document.getElementById('result-panel');
        var content = document.getElementById('result-content');
        panel.classList.add('visible');

        var html = '';

        if (data.best_match && data.status !== 'NO_MATCH' && data.status !== 'ERROR') {
            var m = data.best_match;
            var confClass = m.confidence === 'HIGH' ? 'badge-high' : (m.confidence === 'MEDIUM' ? 'badge-medium' : 'badge-low');
            var priceStr = m.market_price ? ('$' + Number(m.market_price).toFixed(2)) : '—';
            var imgSrc = m.image_url || m.image_url_small || '';

            html += '<div class="result-match">';
            if (imgSrc) {
                html += '<img class="result-img" src="' + escHtml(imgSrc) + '" alt="" onerror="this.style.display=\'none\'">';
            }
            html += '<div class="result-details">';
            html += '<span class="badge ' + confClass + '">' + m.confidence + '</span>';
            html += '<div class="result-name">' + escHtml(m.name) + '</div>';
            html += '<div class="result-set">' + escHtml(m.set_name) + '</div>';
            html += '<div class="result-number">#' + escHtml(m.number) + (m.rarity ? ' &middot; ' + escHtml(m.rarity) : '') + '</div>';
            if (m.market_price) {
                html += '<div class="result-price">' + priceStr + '</div>';
            } else {
                var tcgpUrl = m.tcgplayer_url || ('https://www.tcgplayer.com/search/pokemon/product?q=' + encodeURIComponent(m.name + ' ' + m.set_name));
                html += '<div class="result-price" style="font-size:13px;">';
                html += '<span style="color:var(--muted);">No price data</span> ';
                html += '<a href="' + escHtml(tcgpUrl) + '" target="_blank" rel="noopener" style="color:var(--blue);font-weight:700;font-size:12px;">Check TCGPlayer &rarr;</a>';
                html += '</div>';
            }
            var variants = m.available_variants || [];
            if (variants.length > 1) {
                html += '<div style="margin-top:8px;">';
                html += '<label style="font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Variant / Finish:</label>';
                html += '<select id="variant-select" onchange="PKScanner.onVariantChange()" style="width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;">';
                for (var vi = 0; vi < variants.length; vi++) {
                    var v = variants[vi];
                    var vPrice = v.price ? ' — $' + Number(v.price).toFixed(2) : '';
                    html += '<option value="' + escHtml(v.name) + '" data-price="' + (v.price || '') + '">' + escHtml(v.name) + vPrice + '</option>';
                }
                html += '</select>';
                html += '</div>';
            }
            html += '<div class="result-actions">';
            html += '<button class="btn-primary" onclick="PKScanner.addBestMatch()">Add to Batch</button>';
            html += '<button class="btn-outline" onclick="PKScanner.retake()">Retake</button>';
            html += '</div>';
            html += '</div></div>';

            html += '<div style="font-size:12px;color:var(--muted);font-weight:500;margin-bottom:4px;">' + escHtml(m.match_reason) + '</div>';
        }

        // Candidates — always show when there are alternatives
        var candidates = data.candidates || [];
        if (candidates.length > 1 || data.status === 'AMBIGUOUS') {
            html += '<div style="margin-top:16px;background:var(--yellow-bg);border-radius:12px;padding:14px;">';
            html += '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">';
            html += data.status === 'AMBIGUOUS' ? '&#9888; Pick the correct card:' : '&#128260; Wrong match? Pick the correct version:';
            html += '</div>';
            html += '<div class="candidates-grid">';
            for (var i = 0; i < Math.min(candidates.length, 8); i++) {
                var c = candidates[i];
                var ci = c.image_url_small || c.image_url || '';
                var isBest = data.best_match && c.name === data.best_match.name && c.number === data.best_match.number && c.set_name === data.best_match.set_name;
                html += '<div class="candidate-card' + (isBest ? ' selected' : '') + '" data-idx="' + i + '" onclick="PKScanner.pickCandidate(' + i + ')">';
                if (ci) html += '<img src="' + escHtml(ci) + '" alt="" onerror="this.style.display=\'none\'">';
                html += '<div class="c-name">' + escHtml(c.name) + '</div>';
                html += '<div class="c-set">' + escHtml(c.set_name) + ' #' + escHtml(c.number) + '</div>';
                html += '<div class="c-score">Score: ' + c.score + '</div>';
                if (c.market_price) {
                    html += '<div class="c-set" style="color:var(--green);font-weight:700;">$' + Number(c.market_price).toFixed(2) + '</div>';
                } else {
                    html += '<div class="c-set" style="color:var(--muted);font-style:italic;">No price</div>';
                }
                html += '</div>';
            }
            html += '</div></div>';
        }

        if (data.status === 'NO_MATCH' || data.status === 'ERROR') {
            html += '<div style="text-align:center;padding:20px 0;">';
            html += '<div style="font-size:28px;margin-bottom:8px;">&#128064;</div>';
            html += '<div style="font-size:14px;font-weight:600;color:var(--muted);">' + escHtml(data.error || 'No match found') + '</div>';
            html += '<button class="btn-outline" style="margin-top:12px;" onclick="PKScanner.retake()">Try Again</button>';
            html += '</div>';
        }

        content.innerHTML = html;

        // Debug info
        var debugEl = document.getElementById('debug-content');
        var dbg = data.debug || {};
        var ef = data.extracted_fields || {};
        var debugHtml = '<strong>OCR Text:</strong><br><pre style="white-space:pre-wrap;margin:4px 0 10px;">' + escHtml(dbg.ocr_raw_text || '(none)') + '</pre>';
        debugHtml += '<strong>Extracted:</strong> name=' + escHtml(ef.card_name) + ', number=' + escHtml(ef.collector_number) + ', set=' + escHtml(ef.set_name) + '<br>';
        debugHtml += '<strong>Variants:</strong> ' + escHtml((ef.variant_hints || []).join(', ') || '(none)') + '<br>';
        debugHtml += '<strong>OCR Confidence:</strong> ' + ((ef.ocr_confidence || 0) * 100).toFixed(0) + '%<br>';
        debugHtml += '<strong>Candidates before scoring:</strong> ' + (dbg.candidates_before_scoring || 0) + '<br>';
        debugHtml += '<strong>Processing time:</strong> ' + (data.processing_time_ms || 0).toFixed(0) + 'ms<br>';
        var stages = dbg.stage_times_ms || {};
        debugHtml += '<strong>Stage times:</strong> ';
        for (var k in stages) debugHtml += k + '=' + stages[k].toFixed(0) + 'ms ';
        debugHtml += '<br>';

        if (data.best_match && data.best_match.score_breakdown) {
            debugHtml += '<strong>Score breakdown:</strong> ';
            var sb = data.best_match.score_breakdown;
            for (var sk in sb) debugHtml += sk + '=' + sb[sk] + ' ';
            debugHtml += ' = <strong>' + data.best_match.score + '</strong><br>';
        }
        debugEl.innerHTML = debugHtml;

        // Only scroll to results on desktop; on mobile the camera is at the
        // top and scrolling away makes the user think the camera is moving.
        if (window.innerWidth > 780) {
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    }

    function pickCandidate(idx) {
        if (!lastResult || !lastResult.candidates || !lastResult.candidates[idx]) return;
        var picked = lastResult.candidates[idx];
        addToBatch(picked);
        showStatus('Added: ' + picked.name, 'ok');

        document.querySelectorAll('.candidate-card').forEach(function(el) { el.classList.remove('selected'); });
        var card = document.querySelector('.candidate-card[data-idx="' + idx + '"]');
        if (card) card.classList.add('selected');
    }

    function addBestMatch() {
        if (!lastResult || !lastResult.best_match) return;
        addToBatch(lastResult.best_match);
        showStatus('Added: ' + lastResult.best_match.name, 'ok');
    }

    function retake() {
        document.getElementById('result-panel').classList.remove('visible');
        document.getElementById('debug-content').classList.remove('open');
        document.getElementById('debug-arrow').innerHTML = '&#9654;';
        lastResult = null;
    }

    // ------------------------------------------------------------------
    // Batch management
    // ------------------------------------------------------------------
    function _getVariant() {
        var sel = document.getElementById('variant-select');
        return sel ? sel.value : '';
    }

    function _getVariantPrice() {
        var sel = document.getElementById('variant-select');
        if (!sel) return null;
        var opt = sel.options[sel.selectedIndex];
        var p = opt ? opt.getAttribute('data-price') : null;
        return p ? parseFloat(p) : null;
    }

    function onVariantChange() {
        var price = _getVariantPrice();
        var priceEl = document.querySelector('.result-price');
        if (priceEl && price) {
            priceEl.textContent = '$' + price.toFixed(2);
        }
    }

    function addToBatch(card) {
        var variant = _getVariant();
        var variantPrice = _getVariantPrice();
        var isFoil = variant && variant.toLowerCase().indexOf('holo') >= 0;
        var notes = card.rarity ? ('Rarity: ' + card.rarity) : '';
        if (variant) notes = (notes ? notes + ' | ' : '') + 'Variant: ' + variant;

        batch.push({
            card_name: card.name || card.card_name || '',
            game: 'Pokemon',
            condition: 'NM',
            set_name: card.set_name || '',
            card_number: card.number || card.card_number || '',
            image_url: card.image_url || '',
            auto_price: variantPrice || card.market_price || null,
            is_foil: isFoil,
            variant: variant,
            notes: notes,
        });
        saveBatch();
        renderBatch();
    }

    function removeBatchItem(idx) {
        batch.splice(idx, 1);
        saveBatch();
        renderBatch();
    }

    function setBatchCond(idx, cond) {
        if (batch[idx]) { batch[idx].condition = cond; saveBatch(); }
    }

    function clearBatch() {
        if (!batch.length) return;
        if (!confirm('Clear all ' + batch.length + ' scanned cards?')) return;
        batch = [];
        saveBatch();
        renderBatch();
    }

    function saveBatch() {
        localStorage.setItem('scan_batch', JSON.stringify(batch));
    }

    function goReview() {
        if (!batch.length) return;
        window.location.href = '/inventory/scan/batch-review';
    }

    function renderBatch() {
        var list = document.getElementById('batch-list');
        var countEl = document.getElementById('batch-count');
        var totalEl = document.getElementById('batch-total');
        var doneBtn = document.getElementById('done-btn');
        var clearBtn = document.getElementById('clear-btn');

        countEl.textContent = batch.length + (batch.length === 1 ? ' card' : ' cards');
        doneBtn.disabled = !batch.length;
        clearBtn.disabled = !batch.length;

        var totalPrice = 0;
        for (var t = 0; t < batch.length; t++) {
            if (batch[t].auto_price) totalPrice += Number(batch[t].auto_price);
        }
        totalEl.textContent = batch.length ? ('Batch Total: $' + totalPrice.toFixed(2)) : '';

        list.innerHTML = '';
        for (var i = 0; i < batch.length; i++) {
            (function(idx, item) {
                var el = document.createElement('div');
                el.className = 'batch-item';

                var thumb = '';
                if (item.image_url) {
                    thumb = '<img class="batch-thumb" src="' + escHtml(item.image_url) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
                } else {
                    thumb = '<div class="batch-thumb-placeholder">&#127183;</div>';
                }

                var condOptions = CONDITIONS.map(function(c) {
                    return '<option value="' + c + '"' + (item.condition === c ? ' selected' : '') + '>' + c + '</option>';
                }).join('');

                var price = item.auto_price ? ('$' + Number(item.auto_price).toFixed(2)) : '';

                el.innerHTML =
                    thumb +
                    '<div class="batch-info">' +
                        '<div class="batch-name">' + escHtml(item.card_name) + '</div>' +
                        '<div class="batch-meta">' + escHtml(item.set_name || '') + (item.card_number ? ' #' + escHtml(item.card_number) : '') + (price ? ' &middot; ' + price : '') + '</div>' +
                    '</div>' +
                    '<select class="batch-cond" data-idx="' + idx + '">' + condOptions + '</select>' +
                    '<button class="batch-del" data-idx="' + idx + '" title="Remove">&#x2715;</button>';

                el.querySelector('select').addEventListener('change', function(e) {
                    setBatchCond(parseInt(e.target.dataset.idx), e.target.value);
                });
                el.querySelector('.batch-del').addEventListener('click', function(e) {
                    removeBatchItem(parseInt(e.target.dataset.idx));
                });

                list.appendChild(el);
            })(i, batch[i]);
        }
    }

    // ------------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------------
    function showStatus(msg, cls) {
        var bar = document.getElementById('status-bar');
        bar.innerHTML = msg;
        bar.className = 'status-bar ' + (cls || '');
        bar.style.display = msg ? 'block' : 'none';
    }

    function toggleDebug() {
        var el = document.getElementById('debug-content');
        var arrow = document.getElementById('debug-arrow');
        el.classList.toggle('open');
        arrow.innerHTML = el.classList.contains('open') ? '&#9660;' : '&#9654;';
    }

    renderBatch();

    // Hide flip/stop initially
    document.getElementById('flip-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'none';

    return {
        startCamera: startCamera,
        stopCamera: stopCamera,
        flipCamera: flipCamera,
        addBestMatch: addBestMatch,
        pickCandidate: pickCandidate,
        onVariantChange: onVariantChange,
        retake: retake,
        clearBatch: clearBatch,
        goReview: goReview,
        toggleDebug: toggleDebug,
    };
})();
</script>
</body>
</html>
